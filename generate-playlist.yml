name: Generate playlist.m3u

on:
  push:
    paths:
      - 'channels.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Generate playlist.m3u from channels.json
        run: python3 generate_playlist.py

      - name: Commit and push playlist.m3u
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add playlist.m3u
          git diff --cached --quiet || git commit -m "Auto: update playlist.m3u"
          git push
